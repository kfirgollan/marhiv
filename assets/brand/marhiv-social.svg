  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Mark -->
  <g clip-path="url(#sdisc)">
    <rect x="470" y="190" width="260" height="260" fill="url(#ssky)"/>
    <circle cx="680" cy="280" r="38" fill="url(#ssun)"/>
    <path d="M472 450 L548 340 L628 450 Z" fill="url(#sback)" opacity="0.9"/>
    <path d="M600 196 L706 450 L585 450 Z" fill="url(#slit)"/>
    <path d="M600 196 L585 450 L512 450 Z" fill="url(#sshade)"/>
    <path d="M600 196 L626 264 L616 256 L607 268 L598 254 L589 266 L580 255 L575 264 Z" fill="url(#ssnow)"/>
  </g>
  <circle cx="600" cy="320" r="130" fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="3"/>

  <!-- Wordmark -->
  <text x="600" y="540" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="92" font-weight="800" letter-spacing="-3" fill="url(#stext)">Marhiv</text>
  <!-- Tagline -->
  <text x="600" y="585" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="26" font-weight="500" letter-spacing="0.5" fill="#C9B8E8">Make the AI chatbots you use your own.</text>
</svg>
